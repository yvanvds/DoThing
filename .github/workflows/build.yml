name: Build
on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  sonarqube:
    name: SonarQube
    runs-on: windows-latest
    env:
      FLUTTER_VERSION: 3.38.3
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
          
      # The analysis requires to retrieve dependencies and build successfully
      - name: Setup Flutter
        shell: pwsh
        run: |
          $zip = "$env:RUNNER_TEMP/flutter_windows_${env:FLUTTER_VERSION}-stable.zip"
          $url = "https://storage.googleapis.com/flutter_infra_release/releases/stable/windows/flutter_windows_${env:FLUTTER_VERSION}-stable.zip"
          $flutterBin = "$env:RUNNER_TEMP\flutter\bin"
          Invoke-WebRequest -Uri $url -OutFile $zip
          Expand-Archive -Path $zip -DestinationPath $env:RUNNER_TEMP -Force
          $flutterBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          $env:PATH = "$flutterBin;$env:PATH"
          & "$flutterBin\flutter.bat" --version

      - name: Install dependencies
        working-directory: do_thing
        run: flutter pub get

      - name: Analyze
        working-directory: do_thing
        run: flutter analyze

      - name: Test with coverage
        working-directory: do_thing
        run: flutter test --coverage

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          args: -Dproject.settings=do_thing/sonar-project.properties
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}